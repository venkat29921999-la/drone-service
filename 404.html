<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | StacklySky</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        rgba(15,23,42,.88),
        rgba(15,23,42,.88)
    ),
    url("Assest/drone-bg.webp");

    background-size:cover;
    background-position:center;
}

.error-box{

    max-width:700px;

    padding:60px 40px;

    text-align:center;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:30px;
}

.error-box h1{

    font-size:150px;

    color:#00B4D8;

    line-height:1;
}

.error-box h2{

    color:white;

    margin:20px 0;
}

.error-box p{

    color:#CBD5E1;

    line-height:1.8;

    margin-bottom:40px;
}

.error-buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.error-btn{

    background:#00B4D8;

    color:white;

    padding:15px 30px;

    border-radius:50px;

    transition:.4s;
}

.error-btn:hover{

    transform:translateY(-5px);

    box-shadow:0 15px 30px rgba(0,180,216,.3);
}

.error-btn.secondary{

    background:transparent;

    border:2px solid white;
}

@media(max-width:768px){

.error-box h1{
    font-size:100px;
}

.error-buttons{
    flex-direction:column;
}

}

</style>

</head>
<body>

<div class="error-box">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>
The page you are looking for might have been removed,
renamed, or is temporarily unavailable.
</p>

<div class="error-buttons">

<a href="index.html" class="error-btn">

<i class="fa-solid fa-house"></i>
Back To Home

</a>


<a href="login.html" class="error-btn secondary">

<i class="fa-solid fa-right-to-bracket"></i>
Back To Login

</a>

</div>

</div>

</body>
</html>
